name: macOS App

on:
  workflow_dispatch:

jobs:
  build:
    name: Build app bundle
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Build app bundle
        run: |
          APP_BUILD="${GITHUB_RUN_NUMBER}" ./scripts/build-app.sh
          ls -la dist
          find dist -maxdepth 3 -print

      - name: Zip app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/arstdhneio.app arstdhneio-macos-app.zip

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: arstdhneio-macos-app
          path: arstdhneio-macos-app.zip
          if-no-files-found: error
