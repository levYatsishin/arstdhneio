name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and create release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Build app bundle
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}" APP_BUILD="${GITHUB_RUN_NUMBER}" ./scripts/build-app.sh

      - name: Package app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/arstdhneio.app arstdhneio-macos-app.zip

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: arstdhneio-macos-app.zip
          draft: false
          prerelease: false
          generate_release_notes: true
